<!DOCTYPE html>
<html>
<head>
    <title>Menu - Tasty Bites</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="logo.png" alt="Logo" width="60">
    <h1>Tasty Bites</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="cart.html">Cart</a>
    <span id="cart-count">Cart (0)</span>
    <a href="admin.html">Admin</a>

</nav>

<section class="menu">
    <h2>Our Menu</h2>
    <input
    type="text"
    id="search-box"
    placeholder="🔍 Search Food..."
    onkeyup="searchFood()">
    <div class="filter-buttons">
    <button onclick="filterMenu('all')">All</button>
    <button onclick="filterMenu('pizza')">Pizza</button>
    <button onclick="filterMenu('burger')">Burger</button>
    <button onclick="filterMenu('pasta')">Pasta</button>
</div>


    <div class="menu-container">

        <div class="item pizza">
            <img src="pizza.png" alt="Pizza">
            <h3>Pizza</h3>
            <p>₹299</p>

            <button onclick="addItem('Pizza')">
                Add to Cart
            </button>
        </div>
        <div class="item burger">
            <img src="burger.png" alt="Burger">
            <h3>Burger</h3>
            <p>₹199</p>
            <button onclick="addItem('Burger')">Add to Cart</button>
        </div>
        <div class="item pasta">
            <img src="pasta.png" alt="Pasta">
            <h3>Pasta</h3>
            <p>₹249</p>
            <button onclick="addItem('Pasta')">Add to Cart</button>
        </div>
</section>
<script src="script.js"></script>
</body>
</html>
